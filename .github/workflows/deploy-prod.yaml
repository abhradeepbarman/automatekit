name: Continuous Deployment (Prod)
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push web (prod)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.web
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/automatekit-web:prod-${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/automatekit-web:prod-latest
          build-args: |
            VITE_APP_BASE_URL=${{ secrets.PROD_APP_URL }}
            VITE_API_BASE_URL=${{ secrets.PROD_API_BASE_URL }}

      - name: Build and push server (prod)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.server
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/automatekit-server:prod-${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/automatekit-server:prod-latest

      - name: Build and push executor (prod)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.executor
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/automatekit-executor:prod-${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/automatekit-executor:prod-latest

      - name: Deploy to prod host
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/automatekit/prod
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            docker compose --env-file .env -f docker-compose.prod.yaml pull
            docker compose --env-file .env -f docker-compose.prod.yaml up -d
            docker image prune -f
