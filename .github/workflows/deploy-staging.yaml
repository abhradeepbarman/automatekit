name: Continuous Deployment (Staging)
on:
  push:
    branches:
      - staging

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push web (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.web
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/automatekit-web:staging-${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/automatekit-web:staging-latest
          build-args: |
            VITE_APP_BASE_URL=${{ secrets.STAGING_APP_URL }}
            VITE_API_BASE_URL=${{ secrets.STAGING_API_BASE_URL }}

      - name: Build and push server (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.server
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/automatekit-server:staging-${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/automatekit-server:staging-latest

      - name: Build and push executor (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.executor
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/automatekit-executor:staging-${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/automatekit-executor:staging-latest

      - name: Deploy to staging host
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/automatekit/staging
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} \
            STAGING_IMAGE_TAG=staging-${{ github.sha }} \
            docker compose --env-file .env.staging -f docker-compose.staging.yaml pull \
              automatekit-web-staging automatekit-server-staging automatekit-executor-staging
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} \
            STAGING_IMAGE_TAG=staging-${{ github.sha }} \
            docker compose --env-file .env.staging -f docker-compose.staging.yaml up -d \
              automatekit-web-staging automatekit-server-staging automatekit-executor-staging
            docker image prune -f
