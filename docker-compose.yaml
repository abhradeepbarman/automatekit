services:
  server:
    container_name: server
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    ports:
      - "8000:8000"
    env_file:
      - docker/.env.server
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  executor:
    container_name: executor
    build:
      context: .
      dockerfile: docker/Dockerfile.executor
    env_file:
      - docker/.env.executor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    container_name: web
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - "5173:80"
    env_file:
      - docker/.env.web
    restart: unless-stopped

  postgres:
    image: postgres:16
    env_file:
      - docker/.env.service
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis
    env_file:
      - docker/.env.service
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
