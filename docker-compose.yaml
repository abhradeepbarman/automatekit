services:
  automatekit-web-prod:
    image: ${DOCKER_USERNAME}/automatekit-web:prod-latest
    container_name: automatekit-web-prod
    restart: always
    ports:
      - "3000:80"
    env_file:
      - .env

  automatekit-server-prod:
    image: ${DOCKER_USERNAME}/automatekit-server:prod-latest
    container_name: automatekit-server-prod
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    networks:
      - automatekit-prod-network

  automatekit-executor-prod:
    image: ${DOCKER_USERNAME}/automatekit-executor:prod-latest
    container_name: automatekit-executor-prod
    restart: always
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    networks:
      - automatekit-prod-network

  # -------------------------
  # PostgreSQL
  # -------------------------
  postgres:
    image: postgres:16-alpine
    container_name: automatekit-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - automatekit-prod-network

  # -------------------------
  # Adminer
  # -------------------------
  adminer:
    image: adminer:latest
    container_name: automatekit-adminer
    restart: unless-stopped
    ports:
      - "5050:8080"
    depends_on:
      - postgres
    networks:
      - automatekit-prod-network

  # -------------------------
  # Redis
  # -------------------------
  redis:
    image: redis:7-alpine
    container_name: automatekit-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - automatekit-prod-network

  # -------------------------
  # RedisInsight
  # -------------------------
  redisinsight:
    image: redis/redisinsight:latest
    container_name: automatekit-redisinsight
    restart: unless-stopped
    ports:
      - "5540:5540"
    depends_on:
      - redis
    networks:
      - automatekit-prod-network

volumes:
  postgres_data:
  redis_data:

networks:
  automatekit-prod-network:
    driver: bridge
