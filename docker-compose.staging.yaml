services:
  automatekit-web-staging:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        VITE_APP_BASE_URL: ${STAGING_APP_URL}
        VITE_API_BASE_URL: ${STAGING_API_BASE_URL}
    container_name: automatekit-web-staging
    restart: always
    networks:
      - app-network
  
  automatekit-server-staging:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    container_name: automatekit-server-staging
    restart: always
    environment:
      NODE_ENV: production
      PORT: ${STAGING_SERVER_PORT:-8000}
      DATABASE_URL: ${STAGING_DATABASE_URL}
      ACCESS_SECRET: ${STAGING_ACCESS_SECRET}
      REFRESH_SECRET: ${STAGING_REFRESH_SECRET}
      APP_URL: ${STAGING_APP_URL}
      GOOGLE_CLIENT_ID: ${STAGING_GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${STAGING_GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${STAGING_GOOGLE_REDIRECT_URI}
    depends_on:
      automatekit-postgres-staging:
        condition: service_healthy
    networks:
      - app-network

  automatekit-executor-staging:
    build:
      context: .
      dockerfile: docker/Dockerfile.executor
    container_name: automatekit-executor-staging
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: ${STAGING_DATABASE_URL}
      REDIS_HOST: ${STAGING_REDIS_HOST:-automatekit-redis-staging}
      REDIS_PORT: ${STAGING_REDIS_PORT:-6379}
    depends_on:
      automatekit-postgres-staging:
        condition: service_healthy
      automatekit-redis-staging:
        condition: service_healthy
    networks:
      - app-network

  automatekit-postgres-staging:
    image: postgres:16-alpine
    container_name: automatekit-postgres-staging
    restart: always
    environment:
      POSTGRES_USER: ${STAGING_POSTGRES_USER}
      POSTGRES_PASSWORD: ${STAGING_POSTGRES_PASSWORD}
      POSTGRES_DB: ${STAGING_POSTGRES_DB}
    volumes:
      - automatekit-postgres-staging-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STAGING_POSTGRES_USER} -d ${STAGING_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  automatekit-redis-staging:
    image: redis:7-alpine
    container_name: automatekit-redis-staging
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - automatekit-redis-staging-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  automatekit-postgres-staging-data:
  automatekit-redis-staging-data:

networks:
  app-network:
    driver: bridge
